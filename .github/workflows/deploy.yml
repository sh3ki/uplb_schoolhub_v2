name: Deploy to Production

# ── How this works ───────────────────────────────────────────────────────
# Your local workflow:
#   1. Make code changes
#   2. npm run build  (builds public/build locally)
#   3. git add -A && git commit -m "..." && git push
#   4. This Action fires automatically and deploys to production ✅
#
# Required GitHub Secrets (repo Settings → Secrets and variables → Actions):
#   SSH_HOST          → 72.61.121.165
#   SSH_PORT          → 65002
#   SSH_USER          → u866511543
#   SSH_PRIVATE_KEY   → contents of your SSH private key (e.g. hostinger_deploy)
#   GH_PAT            → GitHub Personal Access Token with repo:read scope
#
# One-time server setup (run these once via SSH):
#   cd /home/u866511543/westerncollege
#   git init
#   git remote add origin https://github.com/LeeDev428/uplb_schoolhub.git
#   git branch -M master
#   git fetch origin master
#   git reset --hard origin/master
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/u866511543/westerncollege

            # Initialize git on very first deployment (only runs once)
            if [ ! -d ".git" ]; then
              echo "[deploy] First-time init..."
              git init
              git remote add origin https://github.com/LeeDev428/uplb_schoolhub.git
              git branch -M master
            fi

            # Pull latest code using PAT (not stored permanently on server)
            echo "[deploy] Pulling latest code..."
            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/LeeDev428/uplb_schoolhub.git
            git fetch origin master --quiet
            git reset --hard origin/master
            git remote set-url origin https://github.com/LeeDev428/uplb_schoolhub.git

            # Refresh Laravel caches
            echo "[deploy] Refreshing caches..."
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan optimize

            echo "[deploy] Done!"

      - name: Summary
        run: |
          echo "Deployed commit ${{ github.sha }} to https://westerncollegesinc.ph"