name: Deploy to Production

# ─────────────────────────────────────────────────────────────────────────
# LOCAL WORKFLOW (every time you make changes):
#   1. npm run build
#   2. git add -A && git commit -m "your message" && git push
#   → This Action fires automatically and deploys to production.
#
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions):
#   SSH_HOST        → 72.61.121.165
#   SSH_PORT        → 65002
#   SSH_USER        → u866511543
#   SSH_PRIVATE_KEY → contents of your ~/.ssh/hostinger_deploy private key
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies (in CI so vendor is rsynced)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Sync files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          # --delete removes old files, but we exclude .env, storage, and the
          # storage symlink so they are never wiped on the server.
          switches: >-
            -avz --delete
            --exclude='.env'
            --exclude='.git'
            --exclude='node_modules'
            --exclude='storage/app/'
            --exclude='storage/framework/cache/'
            --exclude='storage/framework/sessions/'
            --exclude='storage/logs/'
            --exclude='public/storage'
          path: ./
          remote_path: /home/u866511543/westerncollege
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/u866511543/westerncollege

            # Ensure storage symlink exists (ln -sfn is idempotent)
            ln -sfn /home/u866511543/westerncollege/storage/app/public \
                    /home/u866511543/westerncollege/public/storage

            # Correct permissions
            chmod -R 775 storage bootstrap/cache

            # Clear old caches then rebuild
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear
            php artisan optimize

            # Run pending migrations
            php artisan migrate --force

            # Sync grant discounts for all existing student fee records
            php artisan grants:sync

            # Clear PHP-FPM OPcache so updated PHP files take effect immediately
            echo "<?php if (function_exists('opcache_reset')) { opcache_reset(); } @unlink(__FILE__);" > /home/u866511543/westerncollege/public/oc_reset_tmp.php
            curl -sf "https://westerncollegesinc.ph/oc_reset_tmp.php" 2>&1 || true
            rm -f /home/u866511543/westerncollege/public/oc_reset_tmp.php 2>/dev/null || true

            echo "✅ Deployed commit ${{ github.sha }}"