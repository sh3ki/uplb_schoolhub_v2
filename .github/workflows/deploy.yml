name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - SPRINT

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "DEPLOY_PATH=${{ secrets.PROD_DEPLOY_PATH }}" >> $GITHUB_OUTPUT
            echo "APP_URL=https://westerncollegesinc.ph" >> $GITHUB_OUTPUT
            echo "DB_DATABASE=${{ secrets.PROD_DB_DATABASE }}" >> $GITHUB_OUTPUT
            echo "DB_USERNAME=${{ secrets.PROD_DB_USERNAME }}" >> $GITHUB_OUTPUT
            echo "DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "APP_ENV=production" >> $GITHUB_OUTPUT
            echo "APP_DEBUG=false" >> $GITHUB_OUTPUT
            echo "ENV_NAME=production" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_PATH=${{ secrets.STAGING_DEPLOY_PATH }}" >> $GITHUB_OUTPUT
            echo "APP_URL=https://test.westerncollegesinc.ph" >> $GITHUB_OUTPUT
            echo "DB_DATABASE=${{ secrets.STAGING_DB_DATABASE }}" >> $GITHUB_OUTPUT
            echo "DB_USERNAME=${{ secrets.STAGING_DB_USERNAME }}" >> $GITHUB_OUTPUT
            echo "DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "APP_ENV=staging" >> $GITHUB_OUTPUT
            echo "APP_DEBUG=true" >> $GITHUB_OUTPUT
            echo "ENV_NAME=staging" >> $GITHUB_OUTPUT
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, bcmath, curl, zip, gd, mysql
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        run: |
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM dependencies
        run: npm ci

      - name: Generate .env for build
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build Vite assets
        run: |
          php artisan wayfinder:generate --with-form
          npm run build

      - name: Prepare .env for deployment
        run: |
          cat > .env << EOF
          APP_NAME="Western Colleges Inc"
          APP_ENV=${{ steps.vars.outputs.APP_ENV }}
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=${{ steps.vars.outputs.APP_DEBUG }}
          APP_URL=${{ steps.vars.outputs.APP_URL }}

          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US

          APP_MAINTENANCE_DRIVER=file

          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=localhost
          DB_PORT=3306
          DB_DATABASE=${{ steps.vars.outputs.DB_DATABASE }}
          DB_USERNAME=${{ steps.vars.outputs.DB_USERNAME }}
          DB_PASSWORD=${{ steps.vars.outputs.DB_PASSWORD }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=database

          CACHE_STORE=database

          MAIL_MAILER=log
          MAIL_HOST=smtp.hostinger.com
          MAIL_PORT=465
          MAIL_USERNAME=
          MAIL_PASSWORD=
          MAIL_ENCRYPTION=ssl
          MAIL_FROM_ADDRESS="noreply@westerncollegesinc.ph"
          MAIL_FROM_NAME="\${APP_NAME}"

          VITE_APP_NAME="\${APP_NAME}"
          EOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='storage/app/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/logs/*' \
            --exclude='.env.example' \
            --exclude='.env.production.example' \
            --exclude='.env.staging.example' \
            --exclude='phpunit.xml' \
            --exclude='pint.json' \
            --exclude='*.md' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ steps.vars.outputs.DEPLOY_PATH }}/

      - name: Run post-deploy commands
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          cd ${{ steps.vars.outputs.DEPLOY_PATH }}
          
          # Ensure storage directories exist with proper permissions
          mkdir -p storage/app/public
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          
          chmod -R 775 storage bootstrap/cache
          
          # Run Laravel optimization commands
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          
          # Run migrations
          php artisan migrate --force
          
          echo "✅ Deployment to ${{ steps.vars.outputs.ENV_NAME }} completed successfully!"
          ENDSSH

      - name: Deployment summary
        run: |
          echo "🚀 Deployed to ${{ steps.vars.outputs.ENV_NAME }}"
          echo "📍 URL: ${{ steps.vars.outputs.APP_URL }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "📝 Commit: ${{ github.sha }}"
